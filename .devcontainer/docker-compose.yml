services:
  app:
    build:
      context: ./node
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
    ports:
      - "14000:14000"
      - "14001:14001"
      - "6006:6006"
    # init-firewall.sh が iptables/ipset を操作するために必要な権限
    cap_add:
      - NET_ADMIN
      - NET_RAW
    # 特権が必要な初期化(firewall / VNC)を root のエントリポイントで実行する。
    # これにより開発ユーザー(vscode)には sudo を付与せずに済む。
    entrypoint: ["bash", "/workspace/.devcontainer/entrypoint.sh"]
    command: ["sleep", "infinity"]
